<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riddhan's 3rd Birthday</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      overflow-x:hidden;
      background: linear-gradient(135deg,#dff6ff,#fff6d8);
      color:#1b1b1b;
    }

    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
      position:relative;
    }

    .card{
      width:100%;
      max-width:1100px;
      background:white;
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(0,0,0,0.15);
      display:grid;
      grid-template-columns:1fr 1fr;
      position:relative;
    }

    .left{
      background:linear-gradient(135deg,#4da8ff,#77e0ff);
      padding:40px;
      color:white;
      position:relative;
      overflow:hidden;
    }

    .left::before{
      content:'';
      position:absolute;
      width:300px;
      height:300px;
      background:rgba(255,255,255,0.15);
      border-radius:50%;
      top:-120px;
      right:-80px;
    }

    .left::after{
      content:'';
      position:absolute;
      width:220px;
      height:220px;
      background:rgba(255,255,255,0.12);
      border-radius:50%;
      bottom:-80px;
      left:-60px;
    }

    .tag{
      display:inline-block;
      background:white;
      color:#1e88ff;
      padding:10px 18px;
      border-radius:30px;
      font-weight:600;
      margin-bottom:20px;
      font-size:14px;
    }

    h1{
      font-size:4rem;
      line-height:1;
      margin-bottom:10px;
      position:relative;
      z-index:2;
    }

    .birthday{
      font-size:1.5rem;
      margin-bottom:30px;
      position:relative;
      z-index:2;
    }

    .details{
      position:relative;
      z-index:2;
    }

    .detail-box{
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
      padding:18px;
      border-radius:18px;
      margin-bottom:18px;
      border:1px solid rgba(255,255,255,0.25);
    }

    .detail-title{
      font-size:14px;
      opacity:0.8;
      margin-bottom:5px;
    }

    .detail-text{
      font-size:1.3rem;
      font-weight:600;
    }

    .countdown{
      margin-top:25px;
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .time-box{
      background:white;
      color:#1e88ff;
      width:80px;
      height:80px;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .time-box span{
      font-size:1.5rem;
    }

    .time-box small{
      font-size:12px;
    }

    .right{
      position:relative;
      overflow:hidden;
      background:#fff;
    }

    .main-img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .floating-img{
      position:absolute;
      width:180px;
      border-radius:20px;
      border:6px solid white;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      animation:float 4s ease-in-out infinite;
    }

    .img1{
      bottom:30px;
      left:-30px;
      transform:rotate(-8deg);
    }

    .balloon{
      position:absolute;
      width:60px;
      animation:updown 3s ease-in-out infinite;
    }

    .balloon1{
      top:20px;
      right:30px;
    }

    .balloon2{
      top:100px;
      right:100px;
      width:40px;
      animation-delay:1s;
    }

    .footer{
      text-align:center;
      padding:20px;
      font-size:1rem;
      background:#fff9e8;
      font-weight:500;
    }

    @keyframes float{
      0%{transform:translateY(0px) rotate(-8deg);}
      50%{transform:translateY(-10px) rotate(-8deg);}
      100%{transform:translateY(0px) rotate(-8deg);}
    }

    @keyframes updown{
      0%{transform:translateY(0);}
      50%{transform:translateY(-15px);}
      100%{transform:translateY(0);}
    }

    @media(max-width:900px){
      .card{
        grid-template-columns:1fr;
      }

      .right{
        min-height:500px;
      }

      h1{
        font-size:3rem;
      }

      .floating-img{
        width:140px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <div class="card">

      <div class="left">

        <div class="tag">🎉 YOU'RE INVITED 🎉</div>

        <h1>Riddhan</h1>

        <div class="birthday">
          is turning <b>3</b> 🥳
        </div>

        <div class="details">

          <div class="detail-box">
            <div class="detail-title">📍 Venue</div>
            <div class="detail-text">B-2/1</div>
          </div>

          <div class="detail-box">
            <div class="detail-title">📅 Date & Time</div>
            <div class="detail-text">2 June, 5 PM</div>
          </div>

        </div>

        <div class="countdown">

          <div class="time-box">
            <span id="days">00</span>
            <small>Days</small>
          </div>

          <div class="time-box">
            <span id="hours">00</span>
            <small>Hours</small>
          </div>

          <div class="time-box">
            <span id="minutes">00</span>
            <small>Minutes</small>
          </div>

        </div>

      </div>

      <div class="right">

        <!-- Main Image -->
        <img 
          class="main-img" 
          src="1000349584.jpg"
          alt="Riddhan"
        >

        <!-- Floating Image -->
        <img 
          class="floating-img img1" 
          src="1000169099.jpg"
          alt="Riddhan Fun"
        >

        <!-- Balloons -->
        <img 
          class="balloon balloon1" 
          src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"
        >

        <img 
          class="balloon balloon2" 
          src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"
        >

      </div>

    </div>

  </section>

  <div class="footer">
    🎂 Join us for lots of fun, laughter & birthday magic ✨
  </div>

  <script>

    // Countdown Timer

    const birthdayDate = new Date("June 2, 2026 17:00:00").getTime();

    const timer = setInterval(function(){

      const now = new Date().getTime();

      const distance = birthdayDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));

      const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
      );

      const minutes = Math.floor(
        (distance % (1000 * 60 * 60)) / (1000 * 60)
      );

      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;

      if(distance < 0){
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML =
          "<h2>🎉 The Party Has Started 🎉</h2>";
      }

    },1000);

  </script>

</body>
</html>
